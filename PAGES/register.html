<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Co - Register</title>
    <link rel="stylesheet" href="../CSS/register.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">
</head>

<body>

    <h1>Register</h1>
    <form action="" class="form">
        <input type="text" placeholder="Ismingizni kiriting" class="firstname">
        <input type="text" placeholder="Familiyangizni kiriting" class="lastname">
        <input type="text" placeholder="Email kiriting" class="email">
        <input type="password" placeholder="Password kiriting" class="password">
        <input type="text" class="role" placeholder="Role(admin/user)">
        <button class="submit">Register</button>
    </form>

    <p>Akkauntingiz mavjudmi? <a href="login.html">Log In</a></p>

    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>

    <script src="../JS/register.js"></script>
</body>

</html>
